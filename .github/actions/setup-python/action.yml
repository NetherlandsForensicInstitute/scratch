name: Setup Python with uv and just
description: Install Python, uv dependencies, and just with caching

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install Python
      shell: bash
      run: uv python install

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: just install
